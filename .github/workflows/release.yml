name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Cache derived data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build Archive
        run: |
          xcodebuild \
            -project ModKit.xcodeproj \
            -scheme ModKit \
            -configuration Release \
            -archivePath build/ModKit.xcarchive \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            archive

      - name: Export .app
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/ModKit.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGN_IDENTITY="-"

      - name: Zip .app
        run: |
          cd build/export
          zip -r ../../ModKit-${{ github.ref_name }}-macOS.zip ModKit.app

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" | head -20)
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ModKit ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ModKit-${{ github.ref_name }}-macOS.zip
          body: |
            ## ModKit ${{ github.ref_name }}

            Native macOS Modbus TCP scanner and simulator — no dependencies, no Electron.

            ### What's new
            ${{ steps.changelog.outputs.log }}

            ### Install
            1. Download `ModKit-${{ github.ref_name }}-macOS.zip`
            2. Unzip and drag **ModKit.app** to `/Applications`
            3. First launch — macOS will block it because the app is ad-hoc signed (not notarized):
               - **macOS 14/15:** go to **System Settings → Privacy & Security**, scroll down and click **Open Anyway**
               - **macOS 13:** right-click the app → **Open** → **Open**

            > **Tip:** if you see "ModKit is damaged", run this in Terminal to clear the quarantine flag:
            > ```
            > xattr -cr /Applications/ModKit.app
            > ```

            ### Features
            - Watch tab: monitor named registers/bits with scale factor and live values
            - Read Holding Registers (FC03), Input Registers (FC04), Coils (FC01), Discrete Inputs (FC02)
            - Write single register (FC06)
            - Auto-poll with configurable interval
            - Binary column with per-bit position labels (15 → 0)
            - Built-in Modbus TCP simulator (Slave mode, 2 000 registers)
            - Last used IP / port / Unit ID saved automatically
            - Connection timeout (8 s) with Cancel
