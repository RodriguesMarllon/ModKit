name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Archive
        run: |
          xcodebuild \
            -project ModKit.xcodeproj \
            -scheme ModKit \
            -configuration Release \
            -archivePath build/ModKit.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export .app
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/ModKit.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Zip .app
        run: |
          cd build/export
          zip -r ../../ModKit-${{ github.ref_name }}-macOS.zip ModKit.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ModKit ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ModKit-${{ github.ref_name }}-macOS.zip
          body: |
            ## ModKit ${{ github.ref_name }}

            Native macOS Modbus TCP scanner.

            ### Install
            1. Download `ModKit-${{ github.ref_name }}-macOS.zip`
            2. Unzip and drag **ModKit.app** to Applications
            3. First launch: right-click → Open (Gatekeeper bypass for unsigned builds)

            ### Features
            - Read Holding Registers (FC03), Input Registers (FC04), Coils (FC01), Discrete Inputs (FC02)
            - Write single register (FC06)
            - Auto-poll with configurable interval
            - Native macOS Table with sort by column
            - Connection timeout + Cancel button
