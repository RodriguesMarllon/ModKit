name: Request Copilot Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

jobs:
  request-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write

    steps:
      - name: Request Copilot as reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Skip if Copilot already reviewed this PR
          already_reviewed=$(gh api repos/$REPO/pulls/$PR_NUMBER/reviews \
            --jq '[.[] | select(.user.login == "github-copilot[bot]")] | length')

          if [ "$already_reviewed" -gt "0" ]; then
            echo "Copilot already reviewed — skipping request."
            exit 0
          fi

          # Request Copilot review; swallow 422 if already pending
          gh api repos/$REPO/pulls/$PR_NUMBER/requested_reviewers \
            -X POST \
            -f 'reviewers[]=github-copilot[bot]' 2>/dev/null || true

          echo "Copilot review requested."
